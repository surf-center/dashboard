<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 12px;
        color: #222;
      }
      h2, h3 {
        margin: 12px 0 8px;
      }
      .section {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 14px;
      }
      label {
        display: block;
        font-weight: bold;
        margin: 8px 0 4px;
      }
      input[type="text"],
      input[type="email"],
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .btn {
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
        margin-top: 10px;
      }
      .btn.secondary {
        background: #666;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
      .placeholder-tag {
        display: inline-block;
        background: #f1f3f4;
        border: 1px solid #ddd;
        border-radius: 999px;
        padding: 4px 8px;
        margin: 4px 4px 0 0;
        font-size: 12px;
        cursor: pointer;
      }
      .cc-item {
        margin-bottom: 6px;
      }
      .preview-box {
        border: 1px dashed #bbb;
        background: #fafafa;
        padding: 10px;
        border-radius: 6px;
        white-space: pre-wrap;
      }
      .success {
        color: green;
        margin-top: 8px;
      }
      .error {
        color: red;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h2>Mail Template Manager</h2>

    <div class="section">
      <label for="templateSelect">Template kiezen</label>
      <select id="templateSelect"></select>

      <div class="row">
        <div>
          <label for="templateKey">TemplateKey</label>
          <input type="text" id="templateKey">
        </div>
        <div>
          <label for="language">Taal</label>
          <input type="text" id="language" placeholder="bijv. NL of EN">
        </div>
      </div>

      <label for="subject">Onderwerp</label>
      <input type="text" id="subject">

      <label for="body">Inhoud</label>
      <textarea id="body"></textarea>

      <button class="btn" onclick="saveTemplate()">Template opslaan</button>
      <div id="templateMessage"></div>
    </div>

    <div class="section">
      <h3>Available placeholders</h3>
      <div id="placeholderList"></div>

      <label for="newPlaceholder">Nieuwe placeholder</label>
      <input type="text" id="newPlaceholder" placeholder="bijv. CompanyName">
      <button class="btn secondary" onclick="addPlaceholder()">Placeholder toevoegen</button>
      <div id="placeholderMessage"></div>
      <p class="muted">Klik op een placeholder om deze in de inhoud te plakken als {{Placeholder}}.</p>
    </div>

    <div class="section">
      <h3>Ontvanger & placeholder values</h3>

      <div class="row">
        <div>
          <label for="toName">Naam</label>
          <input type="text" id="toName" placeholder="bijv. Jelle van der Veen">
        </div>
        <div>
          <label for="toEmail">Mailadres</label>
          <input type="email" id="toEmail" placeholder="bijv. klant@bedrijf.nl">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="senderName">Afzender naam</label>
          <input type="text" id="senderName" placeholder="bijv. Surfcenter">
        </div>
        <div>
          <label for="replyTo">Reply-to mailadres</label>
          <input type="email" id="replyTo" placeholder="bijv. info@surfcenter.nl">
        </div>
      </div>

      <div id="placeholderInputs"></div>

      <button class="btn secondary" onclick="previewMail()">Preview maken</button>

      <label>Preview onderwerp</label>
      <div id="previewSubject" class="preview-box"></div>

      <label>Preview inhoud</label>
      <div id="previewBody" class="preview-box"></div>
    </div>

    <div class="section">
      <h3>CC collega's</h3>
      <div id="ccList"></div>

      <div class="row">
        <div>
          <label for="newColleagueName">Collega naam</label>
          <input type="text" id="newColleagueName">
        </div>
        <div>
          <label for="newColleagueEmail">Collega mail</label>
          <input type="email" id="newColleagueEmail">
        </div>
      </div>

      <button class="btn secondary" onclick="addColleague()">Collega toevoegen</button>
      <div id="colleagueMessage"></div>
    </div>

    <div class="section">
      <button class="btn" onclick="sendMail()">E-mail verzenden</button>
      <div id="sendMessage"></div>
    </div>

    <script>
      let config = {
        templates: [],
        colleagues: [],
        placeholders: []
      };

      function init() {
        google.script.run
          .withSuccessHandler(loadUI)
          .withFailureHandler(showError)
          .getConfig();
      }

      function loadUI(data) {
        config = data;
        renderTemplateSelect();
        renderPlaceholders();
        renderColleagues();
        renderPlaceholderInputs();
        loadSelectedTemplate();
      }

      function renderTemplateSelect() {
        const select = document.getElementById('templateSelect');
        select.innerHTML = '';

        const empty = document.createElement('option');
        empty.value = '';
        empty.textContent = '-- Nieuwe template --';
        select.appendChild(empty);

        config.templates.forEach(t => {
          const option = document.createElement('option');
          option.value = t.templateKey;
          option.textContent = `${t.templateKey} (${t.language || 'n/a'})`;
          select.appendChild(option);
        });

        select.onchange = loadSelectedTemplate;
      }

      function loadSelectedTemplate() {
        const key = document.getElementById('templateSelect').value;
        const template = config.templates.find(t => t.templateKey === key);

        document.getElementById('templateKey').value = template ? template.templateKey : '';
        document.getElementById('language').value = template ? template.language : '';
        document.getElementById('subject').value = template ? template.subject : '';
        document.getElementById('body').value = template ? template.body : '';
      }

      function renderPlaceholders() {
        const list = document.getElementById('placeholderList');
        list.innerHTML = '';

        config.placeholders.forEach(ph => {
          const tag = document.createElement('span');
          tag.className = 'placeholder-tag';
          tag.textContent = `{{${ph}}}`;
          tag.onclick = () => insertPlaceholder(ph);
          list.appendChild(tag);
        });
      }

      function renderPlaceholderInputs() {
        const container = document.getElementById('placeholderInputs');
        container.innerHTML = '';

        config.placeholders.forEach(ph => {
          const label = document.createElement('label');
          label.textContent = ph;
          const input = document.createElement('input');
          input.type = 'text';
          input.id = `ph_${ph}`;
          input.placeholder = `Waarde voor ${ph}`;
          container.appendChild(label);
          container.appendChild(input);
        });
      }

      function renderColleagues() {
        const container = document.getElementById('ccList');
        container.innerHTML = '';

        config.colleagues.forEach(c => {
          const div = document.createElement('div');
          div.className = 'cc-item';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.value = c.email;
          checkbox.id = 'cc_' + c.email;

          const label = document.createElement('label');
          label.htmlFor = checkbox.id;
          label.style.display = 'inline';
          label.style.fontWeight = 'normal';
          label.textContent = ` ${c.name} (${c.email})`;

          div.appendChild(checkbox);
          div.appendChild(label);
          container.appendChild(div);
        });
      }

      function insertPlaceholder(ph) {
        const textarea = document.getElementById('body');
        const token = `{{${ph}}}`;
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        textarea.value = text.substring(0, start) + token + text.substring(end);
        textarea.focus();
        textarea.selectionStart = textarea.selectionEnd = start + token.length;
      }

      function collectPlaceholderValues() {
        const values = {};
        config.placeholders.forEach(ph => {
          values[ph] = document.getElementById(`ph_${ph}`)?.value || '';
        });
        return values;
      }

      function collectSelectedCc() {
        return config.colleagues
          .filter(c => {
            const el = document.getElementById('cc_' + c.email);
            return el && el.checked;
          })
          .map(c => c.email);
      }

      function saveTemplate() {
        const payload = {
          templateKey: document.getElementById('templateKey').value.trim(),
          language: document.getElementById('language').value.trim(),
          subject: document.getElementById('subject').value,
          body: document.getElementById('body').value
        };

        google.script.run
          .withSuccessHandler(res => {
            document.getElementById('templateMessage').innerHTML = `<div class="success">${res.message}</div>`;
            refreshConfig();
          })
          .withFailureHandler(err => {
            document.getElementById('templateMessage').innerHTML = `<div class="error">${err.message}</div>`;
          })
          .saveTemplate(payload);
      }

      function addColleague() {
        const payload = {
          name: document.getElementById('newColleagueName').value.trim(),
          email: document.getElementById('newColleagueEmail').value.trim()
        };

        google.script.run
          .withSuccessHandler(res => {
            document.getElementById('colleagueMessage').innerHTML = `<div class="success">${res.message}</div>`;
            document.getElementById('newColleagueName').value = '';
            document.getElementById('newColleagueEmail').value = '';
            refreshConfig();
          })
          .withFailureHandler(err => {
            document.getElementById('colleagueMessage').innerHTML = `<div class="error">${err.message}</div>`;
          })
          .addColleague(payload);
      }

      function addPlaceholder() {
        const value = document.getElementById('newPlaceholder').value.trim();

        google.script.run
          .withSuccessHandler(res => {
            document.getElementById('placeholderMessage').innerHTML = `<div class="success">${res.message}</div>`;
            document.getElementById('newPlaceholder').value = '';
            refreshConfig();
          })
          .withFailureHandler(err => {
            document.getElementById('placeholderMessage').innerHTML = `<div class="error">${err.message}</div>`;
          })
          .addPlaceholder(value);
      }

      function previewMail() {
        const payload = {
          subject: document.getElementById('subject').value,
          body: document.getElementById('body').value,
          placeholderValues: collectPlaceholderValues()
        };

        google.script.run
          .withSuccessHandler(res => {
            document.getElementById('previewSubject').textContent = res.subject || '';
            document.getElementById('previewBody').textContent = res.body || '';
          })
          .withFailureHandler(err => {
            document.getElementById('sendMessage').innerHTML = `<div class="error">${err.message}</div>`;
          })
          .previewTemplate(payload);
      }

      function sendMail() {
        const payload = {
          toName: document.getElementById('toName').value.trim(),
          toEmail: document.getElementById('toEmail').value.trim(),
          senderName: document.getElementById('senderName').value.trim(),
          replyTo: document.getElementById('replyTo').value.trim(),
          subject: document.getElementById('subject').value,
          body: document.getElementById('body').value,
          cc: collectSelectedCc(),
          placeholderValues: collectPlaceholderValues()
        };

        google.script.run
          .withSuccessHandler(res => {
            document.getElementById('sendMessage').innerHTML = `<div class="success">${res.message}</div>`;
          })
          .withFailureHandler(err => {
            document.getElementById('sendMessage').innerHTML = `<div class="error">${err.message}</div>`;
          })
          .sendTemplateEmail(payload);
      }

      function refreshConfig() {
        google.script.run
          .withSuccessHandler(loadUI)
          .withFailureHandler(showError)
          .getConfig();
      }

      function showError(err) {
        alert(err.message || err);
      }

      init();
    </script>
  </body>
</html>
